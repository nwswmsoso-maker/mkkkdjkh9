<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مطعم البانيو | نظام كاشير ومطبخ</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', 'Tahoma', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a050a 0%, #1a0f1a 100%);
            min-height: 100vh;
            padding: 12px;
        }

        /* شاشة اختيار الدور */
        .mode-selection {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a050a, #1a0f1a);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-card {
            background: linear-gradient(145deg, #1a101a, #0f080f);
            border-radius: 50px;
            padding: 35px 25px;
            text-align: center;
            border: 2px solid #ff6b9d;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .restaurant-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b9d, #ff2d6d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            font-size: 2.5rem;
            box-shadow: 0 5px 20px rgba(255, 45, 109, 0.3);
        }

        .restaurant-name {
            font-size: 1.8rem;
            color: #ff6b9d;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-card h2 {
            color: #ff6b9d;
            margin-bottom: 8px;
            font-size: 1.2rem;
        }

        .mode-card p {
            color: #b88cb8;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            flex-direction: column;
        }

        .mode-btn {
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .mode-btn:active {
            transform: scale(0.97);
        }

        .mode-cashier {
            background: linear-gradient(135deg, #ff2d6d, #ff6b9d);
            color: white;
        }

        .mode-kitchen {
            background: linear-gradient(135deg, #2d1b2d, #3a1f3a);
            color: #ff6b9d;
            border: 2px solid #ff6b9d;
        }

        /* التطبيقات */
        .app-container {
            max-width: 550px;
            margin: 0 auto;
            background: linear-gradient(145deg, #0a050a, #1a0f1a);
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255, 107, 157, 0.2);
            display: none;
        }

        .app-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -100%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }

        @keyframes checkBounce {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .header {
            background: linear-gradient(135deg, #ff6b9d, #ff2d6d);
            padding: 18px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header p {
            font-size: 0.65rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        .back-btn {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .connection-status {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            padding: 12px;
            max-height: 38vh;
            overflow-y: auto;
        }

        .product-card {
            background: linear-gradient(145deg, #1a101a, #120b12);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(255, 107, 157, 0.3);
            transition: all 0.05s linear;
        }

        .product-card:active {
            transform: scale(0.95);
            background: #ff2d6d;
        }

        .product-emoji {
            font-size: 1.5rem;
        }

        .product-name {
            color: #ffd4e5;
            font-size: 0.75rem;
            margin: 4px 0;
        }

        .product-price {
            color: #ff6b9d;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .table-selector {
            background: linear-gradient(145deg, #1a101a, #120b12);
            margin: 12px;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        .table-selector label {
            color: #ff6b9d;
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
        }

        .table-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .table-btn {
            background: #2d1b2d;
            border: 1px solid #ff6b9d;
            color: #ff6b9d;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .table-btn.active {
            background: linear-gradient(135deg, #ff2d6d, #ff6b9d);
            color: white;
            border: none;
        }

        .cart-section {
            padding: 12px;
            background: #0f080f;
            margin: 12px;
            border-radius: 25px;
        }

        .cart-item {
            background: #1a101a;

            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            background: #2d1b2d;
            border: none;
            color: #ff6b9d;
            width: 28px;
            height: 28px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-action {
            border: none;
            padding: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 6px;
            transition: all 0.05s linear;
        }

        .btn-action:active {
            transform: scale(0.97);
        }

        .btn-send {
            background: linear-gradient(135deg, #ff2d6d, #ff6b9d);
            color: white;
        }

        .btn-clear {
            background: #4a1f3a;
            color: #ff6b9d;
            border: 1px solid #ff6b9d;
        }

        .btn-ready {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .btn-deliver {
            background: linear-gradient(135deg, #ff2d6d, #ff6b9d);
            color: white;
        }

        .order-card {
            background: linear-gradient(145deg, #1a101a, #120b12);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }

        .new-order-card {
            border-right: 3px solid #ff2d6d;
        }

        .ready-order-card {
            border-right: 3px solid #2ecc71;
            background: linear-gradient(145deg, #1a2a1a, #0f1a0f);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 107, 157, 0.2);
            flex-wrap: wrap;
            gap: 5px;
        }

        .order-number {
            font-size: 1rem;
            font-weight: bold;
            color: #ff6b9d;
        }

        .table-badge {
            background: #ff2d6d;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: white;
        }

        .order-time {
            font-size: 0.6rem;
            color: #8b6b8b;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            color: #ffd4e5;
            font-size: 0.75rem;
        }

        .order-total {
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255, 107, 157, 0.2);
            font-weight: bold;
            color: #ff6b9d;
            font-size: 0.85rem;
        }

        .cashier-ready-orders {
            background: #0f080f;
            margin: 12px;
            padding: 12px;
            border-radius: 25px;
            max-height: 32vh;
            overflow-y: auto;
        }

        .ready-card {
            background: linear-gradient(145deg, #1a2a1a, #0f1a0f);
            border-radius: 18px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #2ecc71;
        }

        .empty-state {
            text-align: center;
            padding: 25px;
            color: #8b6b8b;
            font-size: 0.8rem;
        }

        /* إشعار التسليم الأنيق */
        .delivery-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100%);
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(39, 174, 96, 0.4);
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .delivery-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .delivery-notification .check-icon {
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #27ae60;
            font-size: 1.2rem;
            font-weight: bold;
            animation: checkBounce 0.4s ease;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: linear-gradient(135deg, #ff2d6d, #ff6b9d);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            transition: transform 0.2s;
            z-index: 1000;
            text-align: center;
            font-weight: bold;
            font-size: 0.75rem;
            white-space: nowrap;
            max-width: 90%;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .kitchen-orders, .ready-section {
            padding: 12px;
        }

        .section-title {
            color: #ff6b9d;
            margin-bottom: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: #1a101a;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff6b9d;
        }
    </style>
</head>
<body>
<!-- شاشة اختيار الدور -->
<div id="modeSelection" class="mode-selection">
    <div class="mode-card">
        <div class="restaurant-logo">
            🍽️
        </div>
        <div class="restaurant-name">
            مطعم البانيو <span>🇮🇶</span>
        </div>
        <h2>مرحباً بك</h2>
        <p>شنو دورك بالمطعم؟</p>
        <div class="mode-buttons">
            <button class="mode-btn mode-cashier" onclick="selectMode('cashier')">🧾 كاشير | أستقبال الطلبات</button>
            <button class="mode-btn mode-kitchen" onclick="selectMode('kitchen')">👨‍🍳 مطبخ | تجهيز الطلبات</button>
        </div>
    </div>
</div>

<!-- تطبيق الكاشير -->
<div id="cashierApp" class="app-container">
    <div class="header">
        <button class="back-btn" onclick="backToMode()">↺ رجوع</button>
        <h1>🧾 كاشير | أستقبال الطلبات</h1>
        <p>🇮🇶 مطعم البانيو - بغداد</p>
        <div class="connection-status" id="cashierStatus"></div>
    </div>
    <div class="table-selector">
        <label>📌 رقم الطاولة:</label>
        <div class="table-buttons" id="tableButtons"></div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
    <div class="cart-section">
        <h3 style="color:#ff6b9d;margin-bottom:8px;font-size:0.9rem">🛒 الطلب الحالي - طاولة <span id="selectedTableLabel">١</span></h3>
        <div id="cashierCart"></div>
        <div style="margin-top:10px">
            <div style="display:flex;justify-content:space-between;margin:4px 0;font-size:0.8rem"><span>المجموع:</span><span id="cashierSubtotal">٠ د.ع</span></div>
            <div style="display:flex;justify-content:space-between;margin:4px 0;font-size:0.8rem"><span>الضريبة (15%):</span><span id="cashierTax">٠ د.ع</span></div>
            <div style="display:flex;justify-content:space-between;margin:6px 0;font-size:1rem;font-weight:bold;color:#ff6b9d"><span>الإجمالي:</span><span id="cashierTotal">٠ د.ع</span></div>
            <button class="btn-action btn-send" onclick="sendOrderToKitchen()">📤 أرسل الطلب للمطبخ</button>
            <button class="btn-action btn-clear" onclick="clearCashierCart()">🗑️ فريغ السلة</button>
        </div>
    </div>
    <div class="cashier-ready-orders">
        <h3 style="color:#2ecc71;margin-bottom:8px;font-size:0.9rem">✅ طلبات جاهزة للتسليم</h3>
        <div id="cashierReadyOrders"></div>
    </div>
</div>

<!-- تطبيق المطبخ -->
<div id="kitchenApp" class="app-container">
    <div class="header">
        <button class="back-btn" onclick="backToMode()">↺ رجوع</button>
        <h1>👨‍🍳 المطبخ | تجهيز الطلبات</h1>
        <p>الطلبات تجي لحظياً من الكاشير</p>
        <div class="connection-status" id="kitchenStatus"></div>
    </div>
    <div class="kitchen-orders">
        <div class="section-title"><span>🆕</span> طلبات جديدة</div>
        <div id="newOrders"></div>
    </div>
    <div class="ready-section">
        <div class="section-title"><span>✅</span> طلبات جاهزة للتسليم</div>
        <div id="readyOrders"></div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
// ============= إعدادات =============
const ABLY_API_KEY = "Rb_5bw.uuY0Fg:xiw6RyPqBY6CAm7N69a60R4KNogO0QLPzuROjFPs0f4";
let ably = null, channel = null, currentMode = null;
let allOrders = [], currentCart = [], selectedTable = 1, nextOrderNumber = 1, cashierReadyOrders = [];
const TAX_RATE = 0.15;

let products = [
    { id: 1, name: "تمن ومرق", price: 3500, emoji: "🍛" },
    { id: 2, name: "مسكوف", price: 12000, emoji: "🐟" },
    { id: 3, name: "دولمة", price: 8000, emoji: "🥬" },
    { id: 4, name: "قوزي", price: 15000, emoji: "🍖" },
    { id: 5, name: "كبة", price: 4000, emoji: "🥟" },
    { id: 6, name: "مقلوبة", price: 6000, emoji: "🍚" },
    { id: 7, name: "باقلاء", price: 3000, emoji: "🥣" },
    { id: 8, name: "چاي", price: 500, emoji: "🍵" },
    { id: 9, name: "سمبوسة", price: 1000, emoji: "🥟" },
    { id: 10, name: "كباب", price: 8000, emoji: "🍢" }
];

// ============= تنسيق الأرقام =============
function formatNumber(num) {
    let str = Math.round(num).toString();
    let parts = [];
    for(let i = str.length; i > 0; i -= 3) {
        parts.unshift(str.substring(Math.max(0, i-3), i));
    }
    let formatted = parts.join(',');
    let arabic = {'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩',',':'،'};
    return formatted.replace(/[0-9,]/g, m => arabic[m] || m) + ' د.ع';
}

// ============= إشعار تسليم أنيق =============
function showDeliveryNotification(orderNumber, tableNumber) {
    // إنشاء عنصر الإشعار
    let notification = document.createElement('div');
    notification.className = 'delivery-notification';
    notification.innerHTML = `
        <div class="check-icon">✓</div>
        <div>✅ تم تسليم الطلب #${orderNumber} لطاولة ${tableNumber}</div>
    `;
    document.body.appendChild(notification);
    
    // تشغيل الصوت
    try {
        let ctx = new (AudioContext || webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.2;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
        osc.stop(ctx.currentTime + 0.3);
        
        setTimeout(() => {
            let osc2 = ctx.createOscillator();
            let gain2 = ctx.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx.destination);
            osc2.frequency.value = 660;
            gain2.gain.value = 0.2;
            osc2.start();
            gain2.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.25);
            osc2.stop(ctx.currentTime + 0.25);
        }, 200);
    } catch(e) {}
    
    // إظهار الإشعار
    setTimeout(() => notification.classList.add('show'), 10);
    
    // إخفاء الإشعار بعد 3 ثواني
    setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

function showToast(msg) {
    let toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// ============= حفظ البيانات =============
function saveData() {
    localStorage.setItem('banyo_orders', JSON.stringify(allOrders));
    localStorage.setItem('banyo_next', nextOrderNumber);
}

function loadData() {
    let saved = localStorage.getItem('banyo_orders');
    if(saved) allOrders = JSON.parse(saved);
    saved = localStorage.getItem('banyo_next');
    if(saved) nextOrderNumber = parseInt(saved);
}

// ============= Ably =============
function initAbly() {
    try {
        ably = new Ably.Realtime({ key: ABLY_API_KEY });
        channel = ably.channels.get("banyo-restaurant");
        
        ably.connection.on("connected", () => {
            document.querySelectorAll('.connection-status').forEach(el => el.style.background = '#2ecc71');
        });
        
        ably.connection.on("failed", () => {
            document.querySelectorAll('.connection-status').forEach(el => el.style.background = '#e74c3c');
        });
        
        channel.subscribe("new-order", (msg) => {
            let order = msg.data;
            if(currentMode === 'kitchen') {
                allOrders.unshift(order);
                saveData();
                refreshKitchen();
                showToast(`🔔 طلب جديد #${order.orderNumber} - طاولة ${order.tableNumber}`);
            }
        });
        
        channel.subscribe("order-ready", (msg) => {
            let data = msg.data;
            let idx = allOrders.findIndex(o => o.id === data.id);
            if(idx !== -1) {
                allOrders[idx].status = 'ready';
                saveData();
            }
            if(currentMode === 'kitchen') {
                refreshKitchen();
                showToast(`✅ الطلب #${data.orderNumber} جاهز!`);
            }
            if(currentMode === 'cashier') {
                cashierReadyOrders.unshift({
                    id: data.id,
                    orderNumber: data.orderNumber,
                    tableNumber: data.tableNumber,
                    items: data.items,
                    total: data.total,
                    time: data.time
                });
                updateCashierReady();
                showToast(`🔔 طلب #${data.orderNumber} - طاولة ${data.tableNumber} جاهز!`);
            }
        });
        
        channel.subscribe("order-completed", (msg) => {
            let data = msg.data;
            if(currentMode === 'kitchen') {
                allOrders = allOrders.filter(o => o.id !== data.id);
                saveData();
                refreshKitchen();
            }
            if(currentMode === 'cashier') {
                cashierReadyOrders = cashierReadyOrders.filter(o => o.id !== data.id);
                updateCashierReady();
            }
        });
    } catch(e) {
        console.log("Ably error:", e);
    }
}

// ============= الكاشير =============
function createTableButtons() {
    let container = document.getElementById('tableButtons');
    if(!container) return;
    let html = '';
    for(let i = 1; i <= 10; i++) {
        let arabicNum = i.toString().replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
        html += `<button class="table-btn ${selectedTable === i ? 'active' : ''}" onclick="selectTable(${i})">طاولة ${arabicNum}</button>`;
    }
    container.innerHTML = html;
}

function selectTable(n) {
    selectedTable = n;
    createTableButtons();
    document.getElementById('selectedTableLabel').innerText = n.toString().replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

function displayProducts() {
    let grid = document.getElementById('productsGrid');
    if(!grid) return;
    grid.innerHTML = products.map(p => `
        <div class="product-card" onclick="addToCart(${p.id})">
            <div class="product-emoji">${p.emoji}</div>
            <div class="product-name">${p.name}</div>
            <div class="product-price">${formatNumber(p.price)}</div>
        </div>
    `).join('');
}

function addToCart(id) {
    let product = products.find(p => p.id === id);
    if(!product) return;
    let existing = currentCart.find(i => i.id === id);
    if(existing) existing.quantity++;
    else currentCart.push({...product, quantity: 1});
    updateCart();
}

function updateCart() {
    let container = document.getElementById('cashierCart');
    if(!container) return;
    if(currentCart.length === 0) {
        container.innerHTML = '<div class="empty-state">🛒 السلة فاضية</div>';
        updateSummary();
        return;
    }
    container.innerHTML = currentCart.map((item, idx) => `
        <div class="cart-item">
            <div style="font-size:1.2rem">${item.emoji}</div>
            <div style="flex:1">
                <div style="color:#ffd4e5;font-size:0.8rem">${item.name}</div>
                <div style="color:#ff6b9d;font-size:0.65rem">${formatNumber(item.price)}</div>
            </div>
            <div style="display:flex;gap:5px;align-items:center">
                <button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button>
                <span style="color:white;min-width:22px;text-align:center;font-size:0.8rem">${item.quantity}</span>
                <button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button>
            </div>
        </div>
    `).join('');
    updateSummary();
}

function updateQty(idx, change) {
    if(idx >= 0 && idx < currentCart.length) {
        let newQty = currentCart[idx].quantity + change;
        if(newQty <= 0) currentCart.splice(idx, 1);
        else currentCart[idx].quantity = newQty;
        updateCart();
    }
}

function updateSummary() {
    let sub = currentCart.reduce((s, i) => s + (i.price * i.quantity), 0);
    let tax = sub * TAX_RATE;
    let total = sub + tax;
    document.getElementById('cashierSubtotal').innerHTML = formatNumber(sub);
    document.getElementById('cashierTax').innerHTML = formatNumber(tax);
    document.getElementById('cashierTotal').innerHTML = formatNumber(total);
}

function clearCashierCart() {
    if(currentCart.length > 0 && confirm('تريد تفريغ السلة؟')) {
        currentCart = [];
        updateCart();
        showToast('🗑️ السلة فريغت');
    }
}

function sendOrderToKitchen() {
    if(currentCart.length === 0) {
        showToast('⚠️ السلة فاضية');
        return;
    }
    if(!channel) {
        showToast('❌ مشكلة بالاتصال');
        return;
    }
    let sub = currentCart.reduce((s, i) => s + (i.price * i.quantity), 0);
    let tax = sub * TAX_RATE;
    let total = sub + tax;
    let newOrder = {
        id: Date.now(),
        orderNumber: nextOrderNumber++,
        tableNumber: selectedTable,
        items: currentCart.map(i => ({...i})),
        subtotal: sub,
        tax: tax,
        total: total,
        status: 'new',
        time: new Date().toLocaleTimeString('ar-IQ'),
        date: new Date().toLocaleDateString('ar-IQ')
    };
    allOrders.push(newOrder);
    saveData();
    channel.publish("new-order", newOrder);
    showToast(`✅ تم إرسال الطلب #${newOrder.orderNumber} - طاولة ${selectedTable}`);
    currentCart = [];
    updateCart();
}

function updateCashierReady() {
    let container = document.getElementById('cashierReadyOrders');
    if(!container) return;
    if(cashierReadyOrders.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 ماكو طلبات جاهزة</div>';
        return;
    }
    container.innerHTML = cashierReadyOrders.map(order => `
        <div class="ready-card">
            <div class="order-header">
                <span class="order-number">طلب #${order.orderNumber}</span>
                <span class="table-badge">طاولة ${order.tableNumber}</span>
                <span class="order-time">${order.time}</span>
            </div>
            <div class="order-items">
                ${order.items.map(item => `
                    <div class="order-item">
                        <span>${item.emoji} ${item.name} x${item.quantity}</span>
                        <span>${formatNumber(item.price * item.quantity)}</span>
                    </div>
                `).join('')}
            </div>
            <div class="order-total">الإجمالي: ${formatNumber(order.total)}</div>
            <button class="btn-action btn-deliver" onclick="completeOrder(${order.id}, ${order.orderNumber}, ${order.tableNumber})" style="margin-top:8px">🛎️ تم تسليم الطلب</button>
        </div>
    `).join('');
}

function completeOrder(id, num, table) {
    // إظهار الإشعار الأنيق مع الصوت
    showDeliveryNotification(num, table);
    
    cashierReadyOrders = cashierReadyOrders.filter(o => o.id !== id);
    updateCashierReady();
    if(channel) channel.publish("order-completed", { id: id, orderNumber: num });
}

// ============= المطبخ =============
function refreshKitchen() {
    let newDiv = document.getElementById('newOrders');
    let readyDiv = document.getElementById('readyOrders');
    if(!newDiv) return;
    
    let newOrders = allOrders.filter(o => o.status === 'new');
    let readyOrders = allOrders.filter(o => o.status === 'ready');
    
    if(newOrders.length === 0) {
        newDiv.innerHTML = '<div class="empty-state">📭 ماكو طلبات جديدة</div>';
    } else {
        newDiv.innerHTML = newOrders.map(order => `
            <div class="order-card new-order-card">
                <div class="order-header">
                    <span class="order-number">طلب #${order.orderNumber}</span>
                    <span class="table-badge">طاولة ${order.tableNumber}</span>
                    <span class="order-time">${order.time}</span>
                </div>
                <div class="order-items">
                    ${order.items.map(item => `
                        <div class="order-item">
                            <span>${item.emoji} ${item.name}</span>
                            <span>${item.quantity} × ${formatNumber(item.price)}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="order-total">الإجمالي: ${formatNumber(order.total)}</div>
                <button class="btn-action btn-ready" onclick="markReady(${order.id})">✅ جهز الطلب</button>
            </div>
        `).join('');
    }
    
    if(readyOrders.length === 0) {
        readyDiv.innerHTML = '<div class="empty-state">📦 ماكو طلبات جاهزة</div>';
    } else {
        readyDiv.innerHTML = readyOrders.map(order => `
            <div class="order-card ready-order-card">
                <div class="order-header">
                    <span class="order-number">طلب #${order.orderNumber}</span>
                    <span class="table-badge">طاولة ${order.tableNumber}</span>
                    <span class="order-time">${order.time}</span>
                </div>
                <div class="order-items">
                    ${order.items.map(item => `
                        <div class="order-item">
                            <span>${item.emoji} ${item.name} x${item.quantity}</span>
                            <span>${formatNumber(item.price * item.quantity)}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="order-total">الإجمالي: ${formatNumber(order.total)}</div>
                <button class="btn-action btn-deliver" onclick="deliverOrder(${order.id}, ${order.orderNumber}, ${order.tableNumber})">🛎️ سلم الطلب للكاشير</button>
            </div>
        `).join('');
    }
}

function markReady(id) {
    let order = allOrders.find(o => o.id === id);
    if(order) {
        order.status = 'ready';
        saveData();
        refreshKitchen();
        showToast(`✅ الطلب #${order.orderNumber} جاهز!`);
        if(channel) {
            channel.publish("order-ready", {
                id: order.id,
                orderNumber: order.orderNumber,
                tableNumber: order.tableNumber,
                items: order.items,
                total: order.total,
                time: order.time
            });
        }
    }
}

function deliverOrder(id, num, table) {
    allOrders = allOrders.filter(o => o.id !== id);
    saveData();
    refreshKitchen();
    if(channel) channel.publish("order-completed", { id: id, orderNumber: num });
    showToast(`✅ تم تسليم الطلب #${num}`);
}

// ============= التحكم =============
function selectMode(mode) {
    currentMode = mode;
    document.getElementById('modeSelection').style.display = 'none';
    if(mode === 'cashier') {
        document.getElementById('cashierApp').classList.add('active');
        createTableButtons();
        displayProducts();
        updateCart();
        updateCashierReady();
    } else {
        document.getElementById('kitchenApp').classList.add('active');
        refreshKitchen();
    }
}

function backToMode() {
    document.getElementById('cashierApp').classList.remove('active');
    document.getElementById('kitchenApp').classList.remove('active');
    document.getElementById('modeSelection').style.display = 'flex';
    currentMode = null;
}

// ============= بدء التشغيل =============
loadData();
initAbly();
</script>
</body>
